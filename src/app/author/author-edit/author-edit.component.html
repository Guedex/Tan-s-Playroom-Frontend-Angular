<div class="container">
    <h1 *ngIf="author.id == null">{{ 'author.create_title' | translate }}</h1>
    <h1 *ngIf="author.id != null">{{ 'author.edit_title' | translate }}</h1>

    <form>
        <mat-form-field>
            <mat-label>{{ 'common.identifier' | translate }}</mat-label>
            <input type="text" matInput [placeholder]="'common.identifier' | translate" [(ngModel)]="author.id" name="id" disabled>
        </mat-form-field>

        <mat-form-field>
            <mat-label>{{ 'common.name' | translate }}</mat-label>
            <input type="text" matInput [placeholder]="'author.name_placeholder' | translate" [(ngModel)]="author.name" name="name" required>
            <mat-error>{{ 'common.name_empty_error' | translate }}</mat-error>
        </mat-form-field>

        <mat-form-field>
            <mat-label>{{ 'common.nationality' | translate }}</mat-label>
            <input type="text" matInput [placeholder]="'author.nationality_placeholder' | translate" [(ngModel)]="author.nationality" name="nationality" required>
            <mat-error>{{ 'author.nationality_empty_error' | translate }}</mat-error>
        </mat-form-field>
    </form>

    <div class="buttons">
        <button mat-stroked-button (click)="onClose()">{{ 'common.close' | translate }}</button>
        <button mat-flat-button color="primary" (click)="onSave()">{{ 'common.save' | translate }}</button>
    </div>
</div>
